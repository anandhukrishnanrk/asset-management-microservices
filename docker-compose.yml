version: "3.9"

services:

  discovery-server:
    build:
      context: ./discovery-server

    container_name: discovery-server

    ports:
      - "8761:8761"

  asset-api:
    build:
      context: ./asset-api

    container_name: asset-api

    ports:
      - "8081:8081"

    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
      DB_URL: jdbc:mysql://host.docker.internal:3306/kranmaster?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: pass

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      - discovery-server

  cis-api:
    build:
      context: ./cis_api

    container_name: cis-api

    ports:
      - "8082:8082"

    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
      DB_URL: jdbc:mysql://host.docker.internal:3306/kranmaster?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: pass

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      - discovery-server

  api-gateway:
    build:
      context: ./api-gateway

    container_name: api-gateway

    ports:
      - "8080:8080"

    environment:
      EUREKA_URL: http://discovery-server:8761/eureka

    depends_on:
      - discovery-server
      - asset-api
      - cis-api